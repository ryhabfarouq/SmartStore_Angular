<div class="not-found-page d-flex align-items-center justify-content-center min-vh-100">
  <div class="text-center animate-fade-in">
    <div class="error-code gradient-text">404</div>
    <h2 class="mb-3">Oops! Page Not Found</h2>
    <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
    <div class="d-flex gap-3 justify-content-center flex-wrap">
      <button class="btn btn-primary" (click)="goBack()">
        <i class="fas fa-arrow-left me-2"></i>Go Back
      </button>
      <a routerLink="/home" class="btn btn-outline-primary">
        <i class="fas fa-home me-2"></i>Home
      </a>
    </div>
    <div class="floating-icons mt-5">
      <i class="fas fa-search fa-3x text-muted opacity-25"></i>
    </div>
  </div>
</div>
